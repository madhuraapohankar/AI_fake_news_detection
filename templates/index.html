{% extends "base.html" %}
{% block content %}

<div class="card">

    <!-- About Button (Optional Top Right Style) -->
    <div style="text-align: right; margin-bottom: 10px;">
        <a href="{{ url_for('about') }}" class="about-link">
            ℹ️ About Project
        </a>
    </div>

    <h1 class="title">🧠 AI News Verification</h1>
    <p class="subtitle">
        Enter any news article or claim below to verify its authenticity with AI.
    </p>

    <form action="{{ url_for('predict') }}" method="POST">

        <input type="hidden" name="source_page" value="home">

        <textarea
            name="news"
            placeholder="Paste news article here..."
            required
        ></textarea>

        <button type="submit" class="detect-btn">
            🔍 Detect News
        </button>

    </form>

    <!-- Loader -->
    <div id="loader" class="loader hidden"></div>

    <!-- Legacy result cards removed -->

</div>

{% endblock %}
