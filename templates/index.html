{% extends "base.html" %}
{% block content %}

<div class="card">

    <!-- About Button (Optional Top Right Style) -->
    <div style="text-align: right; margin-bottom: 10px;">
        <a href="{{ url_for('about') }}" class="about-link">
            ℹ️ About Project
        </a>
    </div>

    <h1 class="title">🧠 Analyze News Authenticity</h1>
    <p class="subtitle">
        Paste any news article below and our AI will detect whether it is real or fake.
    </p>

    <input type="hidden" name="source_page" value="home">
        <textarea
            name="news"
            placeholder="Paste news article here..."
            required
        ></textarea>

        <button type="submit" class="detect-btn">
            🔍 Detect News
        </button>
    </form>

    <!-- Loader -->
    <div id="loader" class="loader hidden"></div>

    {% if prediction %}
    <div class="result-box
        {% if 'Fake' in prediction %} fake
        {% elif 'Real' in prediction %} real
        {% endif %}">

        <h2 class="prediction-text">{{ prediction }}</h2>

        <div class="confidence-wrapper">
            <span>Confidence</span>

            <div class="confidence-bar">
                <div class="confidence-fill"
                     style="width: {{ confidence|default(0) }}%">
                </div>
            </div>

            <span class="confidence-value">{{ confidence }}%</span>
        </div>

    </div>
    {% endif %}

</div>

{% endblock %}
