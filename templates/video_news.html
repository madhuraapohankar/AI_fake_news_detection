{% extends "base.html" %}
{% block content %}

<div class="live-container">
    <div class="page-header">
        <div class="page-title">🎥 Video News Verification</div>
        <div class="page-subtitle">
            Paste a video transcript or description to verify its authenticity.
        </div>
    </div>

    <div class="premium-card">
        <form method="POST" action="{{ url_for('predict') }}">
            <input type="hidden" name="source_page" value="video_news">
            <textarea
                name="news"
                placeholder="Paste the video transcript, description, or key claims here..."
                required
            ></textarea>
            <button type="submit">🔍 Verify Video Content</button>
        </form>
    </div>

    <div class="upload-features" style="margin-top: 30px;">
        <div class="feature-grid">
            <div class="feature-item">
                <span>📝</span>
                <span>Transcript Analysis</span>
            </div>
            <div class="feature-item">
                <span>🔍</span>
                <span>Claim Verification</span>
            </div>
            <div class="feature-item">
                <span>📰</span>
                <span>Source Cross-Check</span>
            </div>
            <div class="feature-item">
                <span>🎥</span>
                <span>Video Proof Links</span>
            </div>
        </div>
    </div>
</div>

{% endblock %}
