{% extends "base.html" %}
{% block content %}

<div class="container">
    <div class="card auth-container">

        <!-- PROFILE ICON ADDED -->
        <div style="text-align:center; margin-bottom:15px;">
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
                 style="width:80px; border-radius:50%; opacity:0.9;">
        </div>

        <h2 style="text-align:center; margin-bottom:25px;">
            🔐 Authentication Portal
        </h2>

        <!-- ===== ROLE TABS ===== -->
        <div class="tabs" style="text-align:center; margin-bottom:20px;">
            <button type="button" class="tab-btn active" onclick="showRole('userRole', this)">User</button>
            <button type="button" class="tab-btn" onclick="showRole('adminRole', this)">Admin</button>
        </div>

        <!-- ================= USER SECTION ================= -->
        <div id="userRole">

            <!-- USER INNER TABS -->
            <div class="tabs" style="text-align:center; margin-bottom:15px;">
                <button type="button" class="tab-btn active" onclick="showUserTab('loginTab', this)">Login</button>
                <button type="button" class="tab-btn" onclick="showUserTab('registerTab', this)">Register</button>
            </div>

            <!-- USER LOGIN -->
            <div id="loginTab" class="tab-content">
                <form method="POST" action="/login">
                    <input type="hidden" name="role" value="user">

                    <input type="email" name="email" placeholder="User Email" required>
                    <input type="password" name="password" placeholder="Password" required>

                    <!-- REMEMBER ME ADDED -->
                    <div style="display:flex; justify-content:space-between; align-items:center; margin:10px 0;">
                        <label style="font-size:13px;">
                            <input type="checkbox" name="remember"> Remember Me
                        </label>

                        <!-- FORGOT PASSWORD ADDED -->
                        <a href="/forgot-password" style="font-size:13px;">
                            Forgot Password?
                        </a>
                    </div>

                    <button type="submit">User Login</button>
                </form>
            </div>

            <!-- USER REGISTER -->
            <div id="registerTab" class="tab-content" style="display:none;">
                <form method="POST" action="/register">
                    <input type="hidden" name="role" value="user">

                    <input type="text" name="name" placeholder="Full Name" required>
                    <input type="email" name="email" placeholder="Email" required>
                    <input type="password" name="password" placeholder="Password" required>

                    <button type="submit">Register</button>

                    <!-- ALREADY MEMBER ADDED -->
                    <div style="text-align:center; margin-top:10px; font-size:13px;">
                        Already a member?
                        <a href="#" onclick="showUserTab('loginTab')">Sign In</a>
                    </div>
                </form>
            </div>

        </div>

        <!-- ================= ADMIN SECTION ================= -->
        <div id="adminRole" style="display:none;">
            <form method="POST" action="/login">

                <input type="hidden" name="role" value="admin">

                <input type="email" name="email" placeholder="Admin Email" required>
                <input type="password" name="password" placeholder="Admin Password" required>

                <!-- REMEMBER ME + FORGOT FOR ADMIN -->
                <div style="display:flex; justify-content:space-between; align-items:center; margin:10px 0;">
                    <label style="font-size:13px;">
                        <input type="checkbox" name="remember"> Remember Me
                    </label>

                    <a href="/forgot-password" style="font-size:13px;">
                        Forgot Password?
                    </a>
                </div>

                <button type="submit">Admin Login</button>
            </form>
        </div>

    </div>
</div>

<script>
/* ================= ROLE SWITCH ================= */
function showRole(roleId, btn) {
    document.getElementById("userRole").style.display = "none";
    document.getElementById("adminRole").style.display = "none";
    document.getElementById(roleId).style.display = "block";

    let buttons = document.querySelectorAll(".tabs .tab-btn");
    buttons.forEach(b => b.classList.remove("active"));
    if(btn) btn.classList.add("active");
}

/* ================= USER TAB SWITCH ================= */
function showUserTab(tabId, btn) {
    document.getElementById("loginTab").style.display = "none";
    document.getElementById("registerTab").style.display = "none";
    document.getElementById(tabId).style.display = "block";

    let buttons = document.querySelectorAll("#userRole .tab-btn");
    buttons.forEach(b => b.classList.remove("active"));
    if(btn) btn.classList.add("active");
}
</script>

{% endblock %}
