{% extends "base.html" %}
{% block content %}

<div class="container">
    <div class="card auth-container">

        <h2 style="text-align:center; margin-bottom:25px;">
            🔐 Authentication Portal
        </h2>

        <!-- ===== ROLE TABS ===== -->
        <div class="tabs" style="text-align:center; margin-bottom:20px;">
            <button type="button" class="tab-btn active" onclick="showRole('userRole')">User</button>
            <button type="button" class="tab-btn" onclick="showRole('adminRole')">Admin</button>
        </div>

        <!-- ================= USER SECTION ================= -->
        <div id="userRole">

            <!-- USER INNER TABS -->
            <div class="tabs" style="text-align:center; margin-bottom:15px;">
                <button type="button" class="tab-btn active" onclick="showUserTab('loginTab')">Login</button>
                <button type="button" class="tab-btn" onclick="showUserTab('registerTab')">Register</button>
            </div>

            <!-- USER LOGIN -->
            <div id="loginTab" class="tab-content">
                <form method="POST" action="/login">
                    <input type="hidden" name="role" value="user">

                    <input type="email" name="email" placeholder="User Email" required>
                    <input type="password" name="password" placeholder="Password" required>

                    <button type="submit">User Login</button>
                </form>
            </div>

            <!-- USER REGISTER -->
            <div id="registerTab" class="tab-content" style="display:none;">
                <form method="POST" action="/register">
                    <input type="hidden" name="role" value="user">

                    <input type="text" name="name" placeholder="Full Name" required>
                    <input type="email" name="email" placeholder="Email" required>
                    <input type="password" name="password" placeholder="Password" required>

                    <button type="submit">Register</button>
                </form>
            </div>

        </div>

        <!-- ================= ADMIN SECTION ================= -->
        <div id="adminRole" style="display:none;">
            <form method="POST" action="/login">

                <input type="hidden" name="role" value="admin">

                <input type="email" name="email" placeholder="Admin Email" required>
                <input type="password" name="password" placeholder="Admin Password" required>

                <button type="submit">Admin Login</button>
            </form>
        </div>

    </div>
</div>

<script>
/* ================= ROLE SWITCH ================= */
function showRole(roleId) {
    document.getElementById("userRole").style.display = "none";
    document.getElementById("adminRole").style.display = "none";
    document.getElementById(roleId).style.display = "block";
}

/* ================= USER TAB SWITCH ================= */
function showUserTab(tabId) {
    document.getElementById("loginTab").style.display = "none";
    document.getElementById("registerTab").style.display = "none";
    document.getElementById(tabId).style.display = "block";
}
</script>

{% endblock %}
